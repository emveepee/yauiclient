name: Build libmpv Linux (Debian 11)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:11
      options: --privileged

    steps:
      - name: Install base dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential nasm yasm pkg-config \
            git curl wget ca-certificates \
            python3 python3-pip \
            autoconf automake libtool gettext \
            cmake \
            libass-dev libfreetype6-dev libfribidi-dev libharfbuzz-dev \
            libbluray-dev liblcms2-dev libluajit-5.1-dev \
            libfontconfig-dev libjpeg-dev zlib1g-dev libpng-dev \
            libva-dev libvdpau-dev \
            libgl1-mesa-dev \
            libpipewire-0.3-dev libpulse-dev libasound2-dev \
            patchelf

      - name: Remove conflicting dev packages
        run: |
          apt-get remove -y libavdevice-dev libcdio-dev libcdio-paranoia-dev 2>/dev/null || true

      - name: Install newer meson and ninja via pip
        run: |
          pip3 install meson ninja
          echo "/root/.local/bin" >> $GITHUB_PATH

      - name: Download build script from wiki
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/wiki/emveepee/libmpv-mingw64-builder/build-libmpv-linux.sh" \
            -o build-libmpv-linux.sh
          chmod +x build-libmpv-linux.sh

      # NOTE: cache key includes a manual version tag (pixelsmash-v1) in addition
      # to the script hash. restore-keys matches by PREFIX, so even when the
      # script changes, an old cache can still be restored and FFmpeg's
      # .ffmpeg-built-* stamp will cause the build to skip recompiling.
      # Bump the version tag (e.g. pixelsmash-v2) any time you need to force
      # a full rebuild regardless of whether the script itself changed -
      # for example after a CVE fix landed in FFmpeg upstream with no local
      # script change, or to invalidate a known-bad cache.
      - name: Cache build sources
        uses: actions/cache@v4.2.3
        with:
          path: |
            work/src
            work/deps-zvbi
            work/deps-placebo
            work/deps-ffmpeg6
            work/deps-ffmpeg7
          key: libmpv-debian11-pixelsmash-v1-${{ hashFiles('build-libmpv-linux.sh') }}
          # No restore-keys: a partial/prefix match would silently restore
          # the old (vulnerable) FFmpeg build via the .ffmpeg-built-* stamp.
          # Always start clean when forcing a security-relevant rebuild.

      - name: Build libmpv v0.37.0 through v0.41.0
        shell: bash
        run: |
          export PATH="/root/.local/bin:$PATH"
          export JOBS=$(nproc)
          export INSTALL_PREFIX="$HOME/.local"
          ./build-libmpv-linux.sh v0.41.0 v0.40.0 v0.39.0 v0.38.0 v0.37.0
        env:
          FFMPEG6_VERSION: "6.1.1"
          FFMPEG7_VERSION: "7.1.1"
          ZVBI_VERSION: "0.2.44"
          LIBPLACEBO_VERSION: "7.351.0"

      - name: Verify magicyuv decoder is disabled (PixelSmash CVE mitigation)
        if: always()
        shell: bash
        run: |
          fail=0
          for ver in 6 7; do
            for f in work/deps-ffmpeg${ver}/lib/libavcodec.so.*; do
              [[ -f "$f" && ! -L "$f" ]] || continue
              if nm -D "$f" 2>/dev/null | grep -qi "magicyuv_decode"; then
                echo "ERROR: $f still contains magicyuv decoder symbols"
                fail=1
              else
                echo "OK: $f - magicyuv decoder not present"
              fi
            done
          done
          if [[ "$fail" == "1" ]]; then
            echo "magicyuv decoder found in build - PixelSmash CVE mitigation failed"
            echo "Check that --disable-decoder=magicyuv is in the FFmpeg configure flags"
            echo "and that the cache was actually invalidated for this run."
            exit 1
          fi

      - name: Show dependency list
        if: always()
        shell: bash
        run: |
          for tag in v0.41.0 v0.40.0 v0.39.0 v0.38.0 v0.37.0; do
            so=$(find work/build/mpv-$tag -name "libmpv.so*" 2>/dev/null | head -1)
            if [[ -n "$so" ]]; then
              echo "==> libmpv $tag dependencies:"
              ldd "$so" || true
            fi
          done

      - name: Verify audio output drivers are linked
        if: always()
        shell: bash
        run: |
          fail=0
          for tag in v0.41.0 v0.40.0 v0.39.0 v0.38.0 v0.37.0; do
            so=$(find work/build/mpv-$tag -name "libmpv.so*" 2>/dev/null | head -1)
            if [[ -n "$so" ]]; then
              echo "==> checking $tag for audio backends"
              missing=""
              for lib in libpipewire libpulse libasound; do
                ldd "$so" | grep -q "$lib" || missing="$missing $lib"
              done
              if [[ -n "$missing" ]]; then
                echo "ERROR: $tag is missing:$missing"
                fail=1
              else
                echo "OK: $tag has pipewire, pulse, and alsa linked"
              fi
            fi
          done
          if [[ "$fail" == "1" ]]; then
            echo "One or more libmpv builds are missing audio output drivers."
            exit 1
          fi

      - name: Upload SDK artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-sdk-debian11-x86_64
          path: out/libmpv-sdk-*-linux-x86_64.tar.gz
          if-no-files-found: warn

      - name: Upload Runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-runtime-debian11-x86_64
          path: out/libmpv-runtime-*-linux-x86_64.tar.gz
          if-no-files-found: warn

      - name: Upload SHA256s
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-sha256-debian11-x86_64
          path: out/*.sha256
          if-no-files-found: warn