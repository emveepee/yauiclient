name: Build libmpv Linux (Debian 11)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:11
      options: --privileged

    steps:
      - name: Install base dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential nasm yasm pkg-config \
            git curl wget ca-certificates \
            python3 python3-pip \
            autoconf automake libtool gettext \
            cmake \
            libass-dev libfreetype6-dev libfribidi-dev libharfbuzz-dev \
            libbluray-dev liblcms2-dev libluajit-5.1-dev \
            libfontconfig-dev libjpeg-dev zlib1g-dev libpng-dev \
            libva-dev libvdpau-dev \
            libgl1-mesa-dev \
            patchelf

      - name: Remove conflicting dev packages
        run: |
          apt-get remove -y libavdevice-dev libcdio-dev libcdio-paranoia-dev 2>/dev/null || true

      - name: Install newer meson and ninja via pip
        run: |
          pip3 install meson ninja
          echo "/root/.local/bin" >> $GITHUB_PATH

      - name: Download build script from wiki
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/wiki/emveepee/libmpv-mingw64-builder/build-libmpv-linux.sh" \
            -o build-libmpv-linux.sh
          chmod +x build-libmpv-linux.sh

      # Must run before the cache step below - hashFiles('patches/**') needs
      # these on disk to compute the cache key. If a patch changes but this
      # step ran after caching (or the cache key didn't include the patches
      # at all), a cache hit could restore a work/deps-ffmpeg* tree whose
      # own internal stamp files make build-libmpv-linux.sh think that
      # version is "already built" and skip it entirely - patch application
      # included - producing an artifact that silently lacks the fix.
      - name: Download custom patches from wiki
        run: |
          mkdir -p patches/ffmpeg patches/mpv
          for f in mpegvideo_parser_resync_valve.patch combine_frame_shrink.patch; do
            curl -fsSL \
              "https://raw.githubusercontent.com/wiki/emveepee/libmpv-mingw64-builder/$f" \
              -o "patches/ffmpeg/$f"
          done
          for f in idle_packet_pool_clear.patch pool_incremental_gc.patch fence_leak_fix.patch; do
            curl -fsSL \
              "https://raw.githubusercontent.com/wiki/emveepee/libmpv-mingw64-builder/$f" \
              -o "patches/mpv/$f"
          done
          echo "Patches downloaded:"
          find patches -name '*.patch' -print
          # Defensive: normalize line endings. Patch files created on Linux
          # can pick up CRLF if ever committed to the wiki repo from a
          # Windows git client with core.autocrlf=true - corrupts hunk
          # context matching against LF-only source inside this container,
          # even though patch itself starts fine (finds the file, then
          # fails partway through). Cheap and harmless if already LF-only.
          find patches -name '*.patch' -exec sed -i 's/\r$//' {} +

      - name: Cache build sources
        uses: actions/cache@v4.2.3
        with:
          path: |
            work/src
            work/deps-zvbi
            work/deps-placebo
            work/deps-ffmpeg6
            work/deps-ffmpeg7
            work/deps-placebo
          key: libmpv-debian11-all-rpath-v2-${{ hashFiles('build-libmpv-linux.sh', 'patches/**') }}
          restore-keys: |
            libmpv-debian11-all-rpath-v2-${{ hashFiles('build-libmpv-linux.sh') }}-
            libmpv-debian11-all-rpath-v2-

      - name: Build libmpv v0.37.0 through v0.41.0
        run: |
          export PATH="/root/.local/bin:$PATH"
          export JOBS=$(nproc)
          export INSTALL_PREFIX="$HOME/.local"
          export CUSTOM_PATCH_DIR="$PWD/patches"
          ./build-libmpv-linux.sh v0.41.0 v0.40.0 v0.39.0 v0.38.0 v0.37.0
        env:
          FFMPEG6_VERSION: "6.1.1"
          FFMPEG7_VERSION: "7.1.1"
          ZVBI_VERSION: "0.2.44"
          LIBPLACEBO_VERSION: "7.351.0"

      - name: Show dependency list
        if: always()
        run: |
          for tag in v0.41.0 v0.40.0 v0.39.0 v0.38.0 v0.37.0; do
            so=$(find work/build/mpv-$tag -name "libmpv.so*" 2>/dev/null | head -1)
            if [[ -n "$so" ]]; then
              echo "==> libmpv $tag dependencies:"
              ldd "$so" || true
            fi
          done

      - name: Upload SDK artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-sdk-debian11-x86_64
          path: out/libmpv-sdk-*-linux-x86_64.tar.gz
          if-no-files-found: warn

      - name: Upload Runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-runtime-debian11-x86_64
          path: out/libmpv-runtime-*-linux-x86_64.tar.gz
          if-no-files-found: warn

      - name: Upload SHA256s
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: libmpv-sha256-debian11-x86_64
          path: out/*.sha256
          if-no-files-found: warn